<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean One Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="page">
    <div class="login-container">
      <h1 class="login-title">Ocean One Dashboard</h1>
      <p class="login-subtitle">Internal Administration</p>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div id="login-error" class="login-error" hidden>
          Invalid email or password.
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>

  <!-- Dashboard (requires auth) -->
  <div id="dashboard-page" class="page" hidden>
    <!-- Mobile header -->
    <div class="mobile-header">
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <span class="mobile-title">Ocean One</span>
    </div>

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-brand">Ocean One</span>
      </div>
      <ul class="sidebar-nav">
        <li>
          <a href="#orgchart" class="nav-item active" data-tab="orgchart">
            <span class="nav-icon">🏢</span>
            <span class="nav-label">Org Chart</span>
          </a>
        </li>
        <li>
          <a href="#leads" class="nav-item" data-tab="leads">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Job Ad to Interview</span>
          </a>
        </li>
        <li>
          <a href="#training" class="nav-item" data-tab="training">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Training</span>
          </a>
        </li>
        <li>
          <a href="#exam" class="nav-item" data-tab="exam">
            <span class="nav-icon">📝</span>
            <span class="nav-label">Exam &amp; Licence</span>
          </a>
        </li>
        <li>
          <a href="#prospectlist" class="nav-item" data-tab="prospectlist">
            <span class="nav-icon">👥</span>
            <span class="nav-label">人名單</span>
          </a>
        </li>
        <li>
          <a href="#milestone" class="nav-item" data-tab="milestone">
            <span class="nav-icon">🏆</span>
            <span class="nav-label">自爆，邀約，簽單</span>
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <button id="logout-btn" class="logout-btn">
          <span class="nav-icon">🚪</span>
          <span class="nav-label">Logout</span>
        </button>
      </div>
    </nav>

    <!-- Sidebar overlay for mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main content -->
    <main id="main-content" class="main-content">
      <!-- Content injected by router -->
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/data-service.js?v=7"></script>
  <script src="js/orgchart.js?v=3"></script>
  <script src="js/member-detail.js?v=9"></script>
  <script src="js/training.js?v=6"></script>
  <script src="js/leads.js?v=9"></script>
  <script src="js/exam.js?v=5"></script>
  <script src="js/prospectlist.js?v=2"></script>
  <script src="js/milestone.js?v=1"></script>
  <script src="js/app.js?v=7"></script>
</body>
</html>
